<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Martin">
  <!-- Site mark: the amber HUD through-line — a reticle with an ascending
       flight-path marker (scroll = time, gaining altitude). -->
  <rect width="64" height="64" rx="14" fill="#06070a"/>
  <g fill="none" stroke="#ffb000" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="32" cy="32" r="21" stroke-width="2.4" opacity="0.85"/>
    <!-- reticle ticks -->
    <path d="M32 8v6M32 50v6M8 32h6M50 32h6" stroke-width="2.4"/>
    <!-- ascending flight path -->
    <path d="M17 42 L30 33 L38 37 L48 21" stroke-width="3.4"/>
    <!-- flight-path marker (the climbing craft) -->
    <circle cx="48" cy="21" r="3.6" stroke-width="2.6"/>
  </g>
</svg>
