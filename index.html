<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover so the fixed world reaches under notches; the nav /
         footer / skip-link pad themselves with the safe-area insets. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06070a" />
    <meta name="author" content="Martin Svoboda" />
    <meta name="color-scheme" content="dark" />

    <!-- Branded mark (the amber HUD through-line); SVG scales for every tab. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://svobodamartin.dev/" />

    <!-- Fonts are self-hosted (bundled via @fontsource, see src/fonts.ts) —
         no third-party CDN, and the preloader holds the reveal until the
         faces have actually loaded. -->

    <title>Martin — Scroll Through a Life</title>
    <meta
      name="description"
      content="I build software the way I flew jets — verified, end to end. Twenty years in the Air Force, the final years as test pilot. Scroll, and a life flies past."
    />

    <!-- Open Graph / Twitter — the social share card (og.png is a branded
         1200×630 rendered from the site's own DNA). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="svobodamartin.dev" />
    <meta property="og:title" content="Martin — Scroll Through a Life" />
    <meta
      property="og:description"
      content="I build software the way I flew jets — verified, end to end. Twenty years in the Air Force, the final years as test pilot. Scroll, and a life flies past."
    />
    <meta property="og:url" content="https://svobodamartin.dev/" />
    <meta property="og:image" content="https://svobodamartin.dev/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Above the clouds — military jets over a cloud sea with a green cockpit HUD, from Martin's scrollytelling site." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Martin — Scroll Through a Life" />
    <meta
      name="twitter:description"
      content="I build software the way I flew jets — verified, end to end. Twenty years in the Air Force, the final years as test pilot. Scroll, and a life flies past."
    />
    <meta name="twitter:image" content="https://svobodamartin.dev/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
